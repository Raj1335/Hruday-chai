<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hruday Chai</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="brand">
            <h1>☕ POS & Khata</h1>
            <span id="network-status" class="badge online">Online</span>
        </div>
        <nav class="app-nav">
            <button class="nav-btn active" data-target="view-pos">POS</button>
            <button class="nav-btn" data-target="view-khata">Khata</button>
            <button class="nav-btn" data-target="view-shift">Shift</button>
            <button class="nav-btn admin-only" data-target="view-dashboard" style="display: none;">Dashboard</button>
        </nav>
        <div class="user-controls">
            <span id="current-user">Loading...</span>
            <button id="btn-logout" class="btn-outline">Logout</button>
        </div>
    </header>

    <div class="app-container">
        
        <section id="view-pos" class="view-section active">
            <div class="pos-layout">
                <div class="menu-container">
                    <div class="menu-header">
                        <h2>Menu Items</h2>
                        <button id="btn-edit-grid" class="btn-outline admin-only" style="display: none;">Edit Layout</button>
                    </div>
                    <div id="menu-grid" class="menu-grid">
                        </div>
                </div>

                <div class="cart-container">
                    <h2>Current Order</h2>
                    <div id="cart-items" class="cart-items">
                        </div>
                    <div class="cart-summary">
                        <div class="summary-row">
                            <span>Total:</span>
                            <span id="cart-total">₹0.00</span>
                        </div>
                        <button id="btn-checkout" class="btn-primary">Complete Sale</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="view-khata" class="view-section hidden">
            <div class="view-header">
                <h2>Customer Ledgers</h2>
                <button id="btn-new-customer" class="btn-secondary">+ New Customer</button>
            </div>
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Balance Due</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="khata-body">
                        </tbody>
                </table>
            </div>
        </section>

        <section id="view-shift" class="view-section hidden">
            <div class="card-container">
                <h2>End of Shift Handover</h2>
                <div class="form-group">
                    <label for="physical-cash">Physical Cash in Drawer (₹)</label>
                    <input type="number" id="physical-cash" step="1" min="0" placeholder="Enter counted cash">
                </div>
                <div class="shift-stats">
                    <p>Digital Sales Total: <span id="digital-sales-total">₹0.00</span></p>
                    <p>Calculated Mismatch: <span id="shift-mismatch">₹0.00</span></p>
                </div>
                <button id="btn-close-shift" class="btn-primary">Submit Reconciliation</button>
            </div>
        </section>

        <section id="view-dashboard" class="view-section hidden">
            <h2>Business Analytics</h2>
            <div class="dashboard-grid">
                <div class="chart-card">
                    <h3>Sales Trend (Today)</h3>
                    <canvas id="salesChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Top Items</h3>
                    <canvas id="itemsChart"></canvas>
                </div>
            </div>
            <div class="admin-actions mt-4">
                <h3>System Management</h3>
                <button id="btn-sync-force" class="btn-secondary">Force Cloud Sync</button>
            </div>
        </section>

    </div>

    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <h2>System Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="auth-password" required>
                </div>
                <button type="submit" class="btn-primary w-100">Login</button>
            </form>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
</body>
  </html>
